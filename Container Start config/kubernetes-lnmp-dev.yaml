# ===================== Deployment: lnmp =====================
apiVersion: apps/v1
kind: Deployment
metadata:
  name: lnmp
spec:
  strategy:
    type: Recreate
  replicas: 1
  selector:
    matchLabels:
      app: lnmp
  template:
    metadata:
      labels:
        app: lnmp
    spec:
      securityContext:
        runAsUser: 0
        runAsGroup: 0
      containers:
        - name: lnmp
          image: registry.cn-hangzhou.aliyuncs.com/nuoyis/lnmp:dev
          imagePullPolicy: IfNotPresent
          # resources:
          #   requests:
          #     memory: "512Mi"
          #     cpu: "0.25"
          ports:
            - name: http
              containerPort: 80
            - name: https
              containerPort: 443
            - name: mariadb
              containerPort: 3306
          volumeMounts:
            - name: nginx-conf
              mountPath: /web/nginx/conf
            - name: nginx-webside
              mountPath: /web/nginx/webside
            - name: nginx-ssl
              mountPath: /web/nginx/ssl
            - name: mariadb-config
              mountPath: /web/mariadb/config
            - name: mariadb-data
              mountPath: /web/mariadb/data
            - name: mariadb-import
              mountPath: /web/mariadb/import
            - name: mariadb-init
              mountPath: /docker-entrypoint-initdb.d
            - name: logs
              mountPath: /web/logs
            - name: shm
              mountPath: /dev/shm
          startupProbe:
            exec:
              command:
                - /bin/bash
                - -c
                - /web/healthcheck.sh
            failureThreshold: 60
            periodSeconds: 15
            timeoutSeconds: 30
          livenessProbe:
            exec:
              command:
                - /bin/bash
                - -c
                - /web/healthcheck.sh
            initialDelaySeconds: 20
            failureThreshold: 10
            periodSeconds: 15
            timeoutSeconds: 30
          readinessProbe:
            exec:
              command:
                - /bin/bash
                - -c
                - /web/healthcheck.sh
            initialDelaySeconds: 20
            failureThreshold: 6
            periodSeconds: 15
            timeoutSeconds: 30
      volumes:
        - name: nginx-conf
          hostPath:
            path: /server/web/nginx/conf
        - name: nginx-webside
          hostPath:
            path: /server/web/nginx/webside
        - name: nginx-ssl
          hostPath:
            path: /server/web/nginx/ssl
        - name: logs
          hostPath:
            path: /var/log/web
        - name: mariadb-config
          hostPath:
            path: /nuoyis-server/web/mariadb/config
        - name: mariadb-data
          hostPath:
            path: /nuoyis-server/web/mariadb/server
        - name: mariadb-import
          hostPath:
            path: /nuoyis-server/web/mariadb/import
        - name: mariadb-init
          hostPath:
            path: /nuoyis-server/web/mariadb/init
        - name: shm
          emptyDir:
            medium: Memory
            sizeLimit: 1Gi
---
apiVersion: v1
kind: Service
metadata:
  name: lnmp-svc
spec:
  type: LoadBalancer 
  selector:
    app: lnmp
  ports:
    - name: http
      port: 80
      targetPort: 80
      protocol: TCP
    - name: https-tcp
      port: 443
      targetPort: 443
      protocol: TCP
    - name: https-udp
      port: 443
      targetPort: 443
      protocol: UDP
    - name: mariadb
      port: 3306
      targetPort: 3306
      protocol: TCP
  ipFamilyPolicy: PreferDualStack