# ===================== Deployment: lnmp-np =====================
apiVersion: apps/v1
kind: Deployment
metadata:
  name: lnmp-np
spec:
  replicas: 2
  selector:
    matchLabels:
      app: lnmp-np
  template:
    metadata:
      labels:
        app: lnmp-np
    spec:
      securityContext:
        runAsUser: 0
        runAsGroup: 0
      containers:
        - name: lnmp-np
          image: registry.cn-hangzhou.aliyuncs.com/nuoyis/lnmp-np:dev
          imagePullPolicy: IfNotPresent
          # resources:
          #   requests:
          #     memory: "512Mi"
          #     cpu: "0.25"
          ports:
            - name: http
              containerPort: 80
            - name: https
              containerPort: 443
          volumeMounts:
            - name: nginx-conf
              mountPath: /web/nginx/conf
            - name: nginx-webside
              mountPath: /web/nginx/webside
            - name: nginx-ssl
              mountPath: /web/nginx/ssl
            - name: logs
              mountPath: /web/logs
            - name: shm
              mountPath: /dev/shm
          startupProbe:
            exec:
              command:
                - /bin/bash
                - -c
                - /web/healthcheck.sh
            failureThreshold: 60
            periodSeconds: 15
            timeoutSeconds: 30
          livenessProbe:
            exec:
              command:
                - /bin/bash
                - -c
                - /web/healthcheck.sh
            initialDelaySeconds: 20
            failureThreshold: 10
            periodSeconds: 15
            timeoutSeconds: 30
          readinessProbe:
            exec:
              command:
                - /bin/bash
                - -c
                - /web/healthcheck.sh
            initialDelaySeconds: 20
            failureThreshold: 6
            periodSeconds: 15
            timeoutSeconds: 30
      volumes:
        - name: nginx-conf
          hostPath:
            path: /server/web/nginx/conf
        - name: nginx-webside
          hostPath:
            path: /server/web/nginx/webside
        - name: nginx-ssl
          hostPath:
            path: /server/web/nginx/ssl
        - name: logs
          hostPath:
            path: /var/log/web
        - name: shm
          emptyDir:
            medium: Memory
            sizeLimit: 1Gi
---
apiVersion: v1
kind: Service
metadata:
  name: lnmp-np-svc
spec:
  type: LoadBalancer 
  selector:
    app: lnmp-np
  ports:
    - name: http
      port: 80
      targetPort: 80
      protocol: TCP
    - name: https-tcp
      port: 443
      targetPort: 443
      protocol: TCP
    - name: https-udp
      port: 443
      targetPort: 443
      protocol: UDP
  ipFamilyPolicy: PreferDualStack