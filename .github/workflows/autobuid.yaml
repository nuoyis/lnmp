name: autobuild latest Docker Images

on:
  workflow_dispatch:    # 可手动触发
  repository_dispatch:
    types: [autobuild]
  
permissions:
  contents: write
  actions: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
    lnmp-builds:
    strategy:
      matrix:
        build_type: [lnmp-np, lnmp]
        arch: [amd64, arm64]

    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - name: Login GHCR
        run: docker login ghcr.io -u ${{ github.actor }} --password=${{ secrets.GITHUB_TOKEN }}
      - name: lnmp config
        run: |
          mkdir -p build/{config,software}
          cp -r ${{ matrix.build_type }}/config/* build/config
          cp -r software/* build/software
          cp -r config/* build/config
          cp -r Dockerfile build/
      - name: lnmp docker build
        run: docker build --compress --squash --no-cache --build-arg BUILD_TYPE=${{ matrix.build_type }} -t ghcr.io/nuoyis/${{ matrix.build_type }}:${{ matrix.arch }} build
      - name: push GHCR
        run: docker push ghcr.io/nuoyis/${{ matrix.build_type }}:${{ matrix.arch }}

  ci-test-and-push:
    strategy:
      matrix:
        build_type: [lnmp-np, lnmp]
        arch: [amd64, arm64]
    runs-on: ubuntu-24.04
    needs: [lnmp-builds]
    steps:
      - uses: actions/checkout@v4
      - name: Pull images
        run: docker pull ghcr.io/nuoyis/${{ matrix.build_type }}:${{ matrix.arch }}
      - name: Run container
        run: |
          docker run -d --name ${{ matrix.build_type }}-test -p 8080:80 ghcr.io/nuoyis/${{ matrix.build_type }}:${{ matrix.arch }}
          sleep 60
          docker logs ${{ matrix.build_type }}-test
      - name: Run CI test
        run: docker exec ${{ matrix.build_type }}-test /web/healthcheck.sh
      - name: Log in to dockerhub and aliyun dockerhub
        uses: nick-fields/retry@v2
        with:
          timeout_minutes: 10
          max_attempts: 3
          command: |
            docker login --username=${{ secrets.DOCKERHUB_USERNAME }} --password=${{ secrets.DOCKERHUB_TOKEN }}
            docker login --username=${{ secrets.ALIYUN_DOCKER_USERNAME }} --password=${{ secrets.ALIYUN_DOCKER_PASSWORD }} registry.cn-hangzhou.aliyuncs.com
      - name: lnmp docker push
        uses: nick-fields/retry@v2
        with:
          timeout_minutes: 10
          max_attempts: 3
          command: |
            docker tag ghcr.io/nuoyis/${{ matrix.build_type }}:${{ matrix.arch }} nuoyis1024/${{ matrix.build_type }}:${{ matrix.arch }}
            docker tag ghcr.io/nuoyis/${{ matrix.build_type }}:${{ matrix.arch }} registry.cn-hangzhou.aliyuncs.com/nuoyis/${{ matrix.build_type }}:${{ matrix.arch }}
            docker push nuoyis1024/${{ matrix.build_type }}:${{ matrix.arch }}
            docker push registry.cn-hangzhou.aliyuncs.com/nuoyis/${{ matrix.build_type }}:${{ matrix.arch }}
  
  create-manifest:
    runs-on: ubuntu-24.04
    needs: [lnmp-builds,ci-test-and-push]
    steps:
      - uses: actions/checkout@v4
      - name: Log in to dockerhub and aliyun dockerhub
        uses: nick-fields/retry@v2
        with:
          timeout_minutes: 10
          max_attempts: 3
          command: |
            docker login --username=${{ secrets.DOCKERHUB_USERNAME }} --password=${{ secrets.DOCKERHUB_TOKEN }}
            docker login --username=${{ secrets.ALIYUN_DOCKER_USERNAME }} --password=${{ secrets.ALIYUN_DOCKER_PASSWORD }} registry.cn-hangzhou.aliyuncs.com
      - name: Create & Push Multi-arch Manifest
        uses: nick-fields/retry@v2
        with:
          timeout_minutes: 10
          max_attempts: 3
          command: |
            docker manifest create nuoyis1024/lnmp-np:latest \
              --amend nuoyis1024/lnmp-np:amd64 \
              --amend nuoyis1024/lnmp-np:arm64
            docker manifest push nuoyis1024/lnmp-np:latest
            docker manifest create registry.cn-hangzhou.aliyuncs.com/nuoyis/lnmp-np:latest \
              --amend registry.cn-hangzhou.aliyuncs.com/nuoyis/lnmp-np:amd64 \
              --amend registry.cn-hangzhou.aliyuncs.com/nuoyis/lnmp-np:arm64
            docker manifest push registry.cn-hangzhou.aliyuncs.com/nuoyis/lnmp-np:latest
            docker manifest create nuoyis1024/lnmp:latest \
              --amend nuoyis1024/lnmp:amd64 \
              --amend nuoyis1024/lnmp:arm64
            docker manifest push nuoyis1024/lnmp:latest
            docker manifest create registry.cn-hangzhou.aliyuncs.com/nuoyis/lnmp:latest \
              --amend registry.cn-hangzhou.aliyuncs.com/nuoyis/lnmp:amd64 \
              --amend registry.cn-hangzhou.aliyuncs.com/nuoyis/lnmp:arm64
            docker manifest push registry.cn-hangzhou.aliyuncs.com/nuoyis/lnmp:latest