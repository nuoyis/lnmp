name: lnmp-np-Build Multi-Arch Image (dev)

on:
  push:
    branches:
      - dev
    paths:
      - 'start.sh'
      - 'dockerfile*'
      - 'config/**'
      - 'software/**'
      - '.github/workflows/**'
  workflow_dispatch: # 支持手动触发

permissions:
  contents: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  jobs:
  lnmp-np-build:
    strategy:
      matrix:
        include:
          - arch: amd64
            runner: ubuntu-24.04
          - arch: arm64
            runner: ubuntu-24.04-arm

    steps:
      - uses: actions/checkout@v4

      - name: Log in to aliyunHub
        run: docker login --username=${{ secrets.ALIYUN_DOCKER_USERNAME }} --password=${{ secrets.ALIYUN_DOCKER_PASSWORD }} registry.cn-hangzhou.aliyuncs.com
      
      - uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      
      - name: lnmp config
        run: |
          mkdir -p build/config
          cp -r lnmp/config/supervisord.conf.txt build/config/
          cp -r lnmp/config/start.sh.txt build/config/
          cp -r config/* build/config
          cp -r Dockerfile build/
      
      - name: lnmp docker build
        run: |
          docker build --no-cache --build-arg BUILD_TYPE=lnmp-np -t nuoyis1024/lnmp-np:dev-${{ matrix.arch }} build

      - name: lnmp docker push
        run: |
          docker push nuoyis1024/lnmp-np:dev-${{ matrix.arch }}
          docker tag nuoyis1024/lnmp-np:dev-${{ matrix.arch }} registry.cn-hangzhou.aliyuncs.com/nuoyis/lnmp-np:dev-${{ matrix.arch }}
          docker push registry.cn-hangzhou.aliyuncs.com/nuoyis/lnmp-np:dev-${{ matrix.arch }}

  create-manifest:
    runs-on: ubuntu-latest
    needs: [lnmp-np-build]
    steps:
      - uses: actions/checkout@v4
      - name: Log in to aliyunHub
        run: docker login --username=${{ secrets.ALIYUN_DOCKER_USERNAME }} --password=${{ secrets.ALIYUN_DOCKER_PASSWORD }} registry.cn-hangzhou.aliyuncs.com
      - uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Create & Push Multi-arch Manifest
        run: |
          docker manifest create nuoyis1024/lnmp-np:dev \
            --amend nuoyis1024/lnmp-np:dev-amd64 \
            --amend nuoyis1024/lnmp-np:dev-arm64
          docker manifest push nuoyis1024/lnmp-np:dev
          docker manifest create registry.cn-hangzhou.aliyuncs.com/nuoyis/lnmp-np:dev \
            --amend registry.cn-hangzhou.aliyuncs.com/nuoyis/lnmp-np:dev-amd64 \
            --amend registry.cn-hangzhou.aliyuncs.com/nuoyis/lnmp-np:dev-arm64
          docker manifest push registry.cn-hangzhou.aliyuncs.com/nuoyis/lnmp-np:dev